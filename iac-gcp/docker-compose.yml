services:
  # =============================================================================
  # GCP Emulators
  # =============================================================================
  
  # Pub/Sub Emulator
  pubsub-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    platform: linux/amd64
    container_name: pubsub-emulator
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=tsh-industries-local
    ports:
      - "8085:8085"
    environment:
      - PUBSUB_PROJECT_ID=tsh-industries-local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsh-industries-network

  # Firestore Emulator (for metadata storage)
  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    container_name: firestore-emulator
    command: gcloud beta emulators firestore start --host-port=0.0.0.0:8080 --project=tsh-industries-local
    ports:
      - "8080:8080"
    environment:
      - FIRESTORE_PROJECT_ID=tsh-industries-local
    networks:
      - tsh-industries-network

  # MinIO (S3/GCS-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsh-industries-network

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/raw-documents --ignore-existing;
      mc mb local/processed-documents --ignore-existing;
      mc mb local/chunked-documents --ignore-existing;
      mc mb local/embeddings --ignore-existing;
      mc mb local/failed-documents --ignore-existing;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - tsh-industries-network

  # PostgreSQL (replacing Cloud SQL)
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tsh-industries
      - POSTGRES_PASSWORD=localdevpassword
      - POSTGRES_DB=tsh-industries_metadata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tsh-industries -d tsh-industries_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsh-industries-network

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsh-industries-network

  # Qdrant (Vector Database - alternative to Vertex AI Vector Search)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tsh-industries-network

  # =============================================================================
  # Application Services (Cloud Run replacements)
  # =============================================================================

  # Detect File Type Service
  detect-file-type:
    build:
      context: ./src/functions/detect_file_type
      dockerfile: Dockerfile
    container_name: detect-file-type
    ports:
      - "8081:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RAW_BUCKET=raw-documents
      - PROCESSED_BUCKET=processed-documents
      - NEXT_TOPIC=document-processing
      - USE_LOCAL_EMULATORS=true
    depends_on:
      pubsub-emulator:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - tsh-industries-network

  # Document Processor Service
  document-processor:
    build:
      context: ./src/functions/document_processor
      dockerfile: Dockerfile
    container_name: document-processor
    ports:
      - "8082:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - PROCESSED_BUCKET=processed-documents
      - CHUNKED_BUCKET=chunked-documents
      - USE_LOCAL_EMULATORS=true
    depends_on:
      - pubsub-emulator
      - minio
    networks:
      - tsh-industries-network

  # Chunking Service
  chunking-service:
    build:
      context: ./src/functions/chunking_service
      dockerfile: Dockerfile
    container_name: chunking-service
    ports:
      - "8083:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - CHUNKED_BUCKET=chunked-documents
      - USE_LOCAL_EMULATORS=true
    depends_on:
      - pubsub-emulator
      - minio
    networks:
      - tsh-industries-network

  # Embedding Service
  embedding-service:
    build:
      context: ./src/functions/embedding_service
      dockerfile: Dockerfile
    container_name: embedding-service
    ports:
      - "8084:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://minio:9000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - EMBEDDINGS_BUCKET=embeddings
      - USE_LOCAL_EMULATORS=true
      - USE_LOCAL_EMBEDDINGS=true  # Use sentence-transformers instead of Vertex AI
    depends_on:
      - pubsub-emulator
      - minio
      - qdrant
    networks:
      - tsh-industries-network

  # LLM Tagging Service
  llm-tagging-service:
    build:
      context: ./src/functions/llm_tagging
      dockerfile: Dockerfile
    container_name: llm-tagging-service
    ports:
      - "8085:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - STORAGE_EMULATOR_HOST=http://minio:9000
      - DATABASE_URL=postgresql://tsh-industries:localdevpassword@postgres:5432/tsh-industries_metadata
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - USE_LOCAL_EMULATORS=true
      - USE_MOCK_LLM=true  # Use mock responses instead of Vertex AI
    depends_on:
      - pubsub-emulator
      - minio
      - postgres
    networks:
      - tsh-industries-network

  # RAG Query Service
  rag-query-service:
    build:
      context: ./src/functions/rag_query
      dockerfile: Dockerfile
    container_name: rag-query-service
    ports:
      - "8086:8080"
    environment:
      - PROJECT_ID=tsh-industries-local
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=postgresql://tsh-industries:localdevpassword@postgres:5432/tsh-industries_metadata
      - USE_LOCAL_EMULATORS=true
      - USE_LOCAL_EMBEDDINGS=true
      - USE_MOCK_LLM=true
    depends_on:
      - qdrant
      - postgres
    networks:
      - tsh-industries-network

  # =============================================================================
  # Monitoring & Debugging
  # =============================================================================

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8088:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - tsh-industries-network

  # Pub/Sub UI (for debugging) - Using gcloud CLI instead since dedicated UI image is unavailable
  # To view Pub/Sub topics/subscriptions, use:
  #   docker exec -it pubsub-emulator gcloud pubsub topics list --project=tsh-industries-local
  #   docker exec -it pubsub-emulator gcloud pubsub subscriptions list --project=tsh-industries-local
  
  # Alternative: Use a simple web UI for debugging
  pubsub-debug:
    image: alpine:latest
    container_name: pubsub-debug
    command: >
      sh -c "
        apk add --no-cache curl &&
        echo 'Pub/Sub Debug Container Ready' &&
        echo 'Use: curl http://pubsub-emulator:8085/v1/projects/tsh-industries-local/topics' &&
        tail -f /dev/null
      "
    depends_on:
      - pubsub-emulator
    networks:
      - tsh-industries-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  minio-data:
    driver: local
  postgres-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  tsh-industries-network:
    driver: bridge
