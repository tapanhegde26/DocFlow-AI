# k8s/base/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: genai-pipeline
  labels:
    app.kubernetes.io/name: genai-pipeline
    app.kubernetes.io/part-of: tsh-industries
---
# k8s/base/resource-quota.yaml
apiVersion: v1
kind: ResourceQuota
metadata:
  name: genai-pipeline-quota
  namespace: genai-pipeline
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
---
# k8s/base/limit-range.yaml
apiVersion: v1
kind: LimitRange
metadata:
  name: genai-pipeline-limits
  namespace: genai-pipeline
spec:
  limits:
  - default:
      cpu: "2"
      memory: 4Gi
    defaultRequest:
      cpu: "500m"
      memory: 1Gi
    type: Container
---
# k8s/base/network-policy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: genai-pipeline
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: genai-pipeline
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          app.kubernetes.io/name: genai-pipeline
---
# k8s/base/priority-class.yaml
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: genai-high-priority
value: 1000000
globalDefault: false
description: "High priority for critical GenAI pipeline services"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: genai-normal-priority
value: 500000
globalDefault: true
description: "Normal priority for GenAI pipeline services"
