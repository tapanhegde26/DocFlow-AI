# k8s/services/llm-tagging/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-tagging
  namespace: genai-pipeline
  labels:
    app: llm-tagging
    app.kubernetes.io/name: llm-tagging
    app.kubernetes.io/component: data-ingestion
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-tagging
  template:
    metadata:
      labels:
        app: llm-tagging
        app.kubernetes.io/name: llm-tagging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: genai-workload-sa
      priorityClassName: genai-high-priority
      
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: cloud.google.com/gke-spot
                operator: In
                values:
                - "true"
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: llm-tagging
              topologyKey: kubernetes.io/hostname
      
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      terminationGracePeriodSeconds: 90
      
      containers:
      - name: llm-tagging
        image: ARTIFACT_REGISTRY_URL/llm-tagging:latest
        imagePullPolicy: Always
        
        ports:
        - containerPort: 8080
          name: http
        
        envFrom:
        - configMapRef:
            name: genai-pipeline-config
        
        env:
        - name: GCP_PROJECT
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: VERTEX_MODEL_ID
          value: "gemini-1.5-pro"
        
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 8Gi
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
        
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: llm-tagging
  namespace: genai-pipeline
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: llm-tagging
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-tagging-hpa
  namespace: genai-pipeline
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-tagging
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llm-tagging-pdb
  namespace: genai-pipeline
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llm-tagging
